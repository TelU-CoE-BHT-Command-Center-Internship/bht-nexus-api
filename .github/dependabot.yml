version: 2

updates:
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: '05:00'
          timezone: Asia/Jakarta
      open-pull-requests-limit: 5
      groups:
          npm-minor-and-patch:
              update-types:
                  - minor
                  - patch

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: '05:30'
          timezone: Asia/Jakarta
      open-pull-requests-limit: 3
